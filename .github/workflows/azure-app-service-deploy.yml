name: Azure App Service CI/CD

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: kranavigator-app
  NODE_VERSION: '22.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output structure:"
          ls -la dist/
          echo ""
          echo "Server files:"
          ls -la dist/server/ || echo "No server directory"
          echo ""
          echo "Client files:"
          ls -la dist/client/ || echo "No client directory"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '.'

      - name: Deployment Summary
        run: |
          echo "✓ Build: Complete"
          echo "✓ Deploy to Azure App Service: Complete"
          echo ""
          echo "Application is running at: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
