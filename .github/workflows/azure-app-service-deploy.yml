name: Azure App Service CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: deployment
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: kranavigator-app
  NODE_VERSION: '22.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output structure:"
          ls -la dist/
          echo ""
          echo "Server files:"
          ls -la dist/server/ || echo "No server directory"
          echo ""
          echo "Client files:"
          ls -la dist/client/ || echo "No client directory"

      - name: Create deployment package for Linux
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp server.js deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp .deployment deploy-package/
          
          echo "✓ Deployment package created"
          echo "Contents:"
          ls -la deploy-package/
          echo ""
          echo "Client files in dist/client:"
          find deploy-package/dist/client -type f | head -10
          echo ""
          echo "Total files:"
          find deploy-package -type f | wc -l

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './deploy-package'

      - name: Wait and verify deployment
        run: |
          echo "Waiting for App Service to become ready..."
          for i in {1..40}; do
            echo "Check $i/40..."
            if curl -s -I https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/ | grep -q "200\|301\|302"; then
              echo "✓ Application is responding!"
              exit 0
            fi
            echo "Waiting... (attempt $i)"
            sleep 5
          done
          echo "⚠ Timeout waiting for app to respond"

      - name: Deployment Summary
        run: |
          echo "✓ Build: Complete"
          echo "✓ Deploy to Azure App Service: Complete"
          echo ""
          echo "Application is running at: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
