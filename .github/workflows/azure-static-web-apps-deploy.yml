name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup deployment
        run: |
          echo "Checking build output:"
          ls -la dist/ || true
          echo ""
          find dist -maxdepth 2 -type d || true
          echo ""
          echo "Looking for index.html:"
          find dist -name "index.html" -type f
          echo ""
          echo "Creating dist/deploy and copying files:"
          mkdir -p dist/deploy
          if [ -d "dist/client/client" ]; then
            cp -v dist/client/client/* dist/deploy/ 2>&1 || true
          elif [ -d "dist/client" ]; then
            # Try copying from dist/client if dist/client/client doesn't exist
            cp -v dist/client/* dist/deploy/ 2>&1 || true
          else
            echo "ERROR: Neither dist/client/client nor dist/client found!"
            exit 1
          fi
          cp staticwebapp.config.json dist/deploy/ 2>&1 || echo "Note: staticwebapp.config.json copy skipped"
          echo ""
          echo "Verifying deployment contents:"
          ls -la dist/deploy/ || exit 1

      - name: Verify deployment
        run: |
          if [ ! -d "dist/deploy" ] || [ ! -f "dist/deploy/index.html" ]; then
            echo "ERROR: Deployment directory or index.html missing!"
            ls -la dist/deploy/ || echo "dist/deploy does not exist!"
            exit 1
          fi
          echo "✓ Deployment verified"

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "dist/deploy"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
